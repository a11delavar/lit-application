name: 🔍 Quality Assurance

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, review_requested, ready_for_review, synchronize]

jobs:
  typescript:
    name: 🏗️ Type Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 26.x
        cache: 'npm'
    - run: npm ci
    - run: npm run typescript
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26.x
          cache: 'npm'
      - run: npm ci
      - run: npm run test
  lint:
    name: 📝 Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 26.x
        cache: 'npm'
    - run: npm ci
    - run: npm run lint